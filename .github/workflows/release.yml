name: Release

on:
  workflow_dispatch:
    inputs:
      increment:
        description: "Version bump to apply"
        required: true
        type: choice
        default: auto
        options:
          - auto
          - major
          - minor
          - patch
      draft:
        description: "Create a draft release instead of publishing it"
        required: true
        type: boolean
        default: false
      force:
        description: "Force a patch release when auto finds no eligible commit"
        required: true
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_BRANCH: ${{ github.event.repository.default_branch }}
      INCREMENT: ${{ inputs.increment }}
      DRAFT_RELEASE: ${{ inputs.draft }}
      FORCE_RELEASE: ${{ inputs.force }}

    steps:
      - name: Check out the default branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install release tooling
        run: uv sync --locked --all-groups

      - name: Calculate version and create tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "$(git status --porcelain)" ]]; then
            echo "::error::The release branch is not clean. Refusing to create a release."
            git status --short
            exit 1
          fi

          git switch --force-create "$RELEASE_BRANCH" "origin/$RELEASE_BRANCH"

          previous_tag="$(git describe --tags --abbrev=0 HEAD 2>/dev/null || true)"
          if [[ -z "$previous_tag" ]]; then
            echo "::error::Could not find a previous release tag."
            exit 1
          fi

          if [[ "$INCREMENT" == "auto" ]]; then
            bump_args=(--get-next --yes)
            if [[ "$FORCE_RELEASE" == "true" ]]; then
              bump_args+=(--allow-no-commit)
            fi
            if ! next_version_output="$(uv run --no-sync cz bump "${bump_args[@]}" 2>&1)"; then
              echo "::error::No eligible conventional commits were found for an automatic release."
              printf '%s\n' "$next_version_output"
              exit 1
            fi
          else
            echo "Using explicit $INCREMENT bump."
            next_version_output="$(uv run --no-sync cz bump --get-next \
              --increment "${INCREMENT^^}" --yes --allow-no-commit)"
          fi

          next_version="$(printf '%s\n' "$next_version_output" | tail -n 1)"
          if [[ ! "$next_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Commitizen returned an invalid next version: '$next_version'."
            printf '%s\n' "$next_version_output"
            exit 1
          fi

          target_tag="v$next_version"
          if [[ ! "$target_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]]; then
            echo "::error::The calculated version did not create a semantic-version tag."
            exit 1
          fi
          if git rev-parse "$target_tag" >/dev/null 2>&1; then
            echo "::error::The tag $target_tag already exists."
            exit 1
          fi

          git tag "$target_tag"
          git push origin "$target_tag"

          echo "previous_tag=$previous_tag" >> "$GITHUB_OUTPUT"
          echo "target_tag=$target_tag" >> "$GITHUB_OUTPUT"
          echo "Generated $target_tag from $previous_tag without modifying the default branch."

      - name: Verify release-note skill
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${COPILOT_GITHUB_TOKEN:-}" ]]; then
            echo "::error::The COPILOT_GITHUB_TOKEN repository secret is not configured."
            echo "Create a fine-grained PAT with the Copilot Requests permission and add it as a repository secret."
            exit 1
          fi

          if ! gh copilot -- skill list | grep -Fq 'gh-release-notes'; then
            echo "::error::The gh-release-notes skill was not discovered by GitHub CLI."
            exit 1
          fi

      - name: Generate release notes with gh-release-notes
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          PREVIOUS_TAG: ${{ steps.version.outputs.previous_tag }}
          TARGET_TAG: ${{ steps.version.outputs.target_tag }}
        run: |
          set -euo pipefail

          prompt="Use the /gh-release-notes skill.

          Generate the final release notes for ${TARGET_TAG}, covering the actual changes from ${PREVIOUS_TAG} to ${TARGET_TAG} in ${GITHUB_WORKSPACE}.

          Follow the skill's diff-based analysis process. Include only changes with a proven user-facing consequence; exclude CI, workflows, release automation, internal skills, guidelines, tests, file lists, and other repository housekeeping unless the diff proves direct product impact. If there is no product impact, emit exactly one bold Maintenance, Documentation, or Internal label followed by one concise paragraph, using the same label-plus-paragraph shape as the skill's example. Return only the final release-note Markdown, with no title heading, introduction, explanation, file summary, or code fence. Do not modify, commit, or push any repository files."

          copilot_output="$(mktemp)"
          trap 'rm -f "$copilot_output"' EXIT

          gh copilot -- \
            --prompt "$prompt" \
            --silent \
            --no-ask-user \
            --no-auto-update \
            --no-color \
            --output-format json \
            --disable-builtin-mcps \
            --available-tools='read,shell' \
            --allow-tool='read' \
            --allow-tool='shell(git:*)' \
            --allow-url='https://github.com' \
            --allow-url='https://copilot-session-usage.readthedocs.io' \
            > "$copilot_output"

          python scripts/extract_release_notes.py "$copilot_output" release-notes.md

      - name: Upload generated notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes-${{ steps.version.outputs.target_tag }}
          path: release-notes.md

      - name: Create GitHub release
        env:
          TARGET_TAG: ${{ steps.version.outputs.target_tag }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$TARGET_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::A GitHub Release already exists for $TARGET_TAG."
            exit 1
          fi

          release_args=(
            --repo "$GITHUB_REPOSITORY"
            --verify-tag
            --title "$TARGET_TAG"
            --notes-file release-notes.md
          )
          if [[ "$DRAFT_RELEASE" == "true" ]]; then
            release_args+=(--draft)
          fi

          gh release create "$TARGET_TAG" "${release_args[@]}"
